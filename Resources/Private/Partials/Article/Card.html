<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<article class="dc-card" data-article-uid="{article.uid}">

    <!-- Image -->
    <a class="dc-card__media" href="{f:uri.action(action:'show', arguments:'{article: article.uid}')}">
        <f:if condition="{article.image}">
            <f:then>
                <f:image image="{article.image}" class="dc-card__img" alt="{article.productName}" width="400" height="300c" loading="lazy" />
            </f:then>
            <f:else>
                <div class="dc-card__placeholder">
                    <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 48L22 34a4 4 0 015.6 0L42 48m-4-4 8-8a4 4 0 015.6 0L68 52" stroke="#C8C8C8" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="26" cy="22" r="6" stroke="#C8C8C8" stroke-width="2"/>
                    </svg>
                    <span class="dc-card__placeholder-label"><f:translate key="card.placeholder" extensionName="DigitalCatalog" /></span>
                </div>
            </f:else>
        </f:if>

        <!-- System Badges -->
        <f:if condition="{article.systems}">
            <div class="dc-card__badges">
                <f:for each="{article.systems}" as="system" iteration="iter">
                    <f:if condition="{iter.index} < 2">
                        <span class="dc-tag dc-tag--sm">{system.title}</span>
                    </f:if>
                </f:for>
                <f:if condition="{article.systems -> f:count()} > 2">
                    <span class="dc-tag dc-tag--sm" title="{f:translate(key: 'card.systems.more', extensionName: 'DigitalCatalog')}">
                        +{article.systems -> f:count()}
                    </span>
                </f:if>
            </div>
        </f:if>
    </a>

    <!-- Body -->
    <div class="dc-card__body">
        <a class="dc-card__title-link" href="{f:uri.action(action:'show', arguments:'{article: article.uid}')}">
            <h3 class="dc-card__title">{article.productName}</h3>
        </a>
        <p class="dc-card__number">{article.articleNumber}</p>
    </div>

    <!-- Actions -->
    <div class="dc-card__actions">
        <a class="dc-card__detail-link" href="{f:uri.action(action:'show', arguments:'{article: article.uid}')}">
            <f:translate key="card.details" extensionName="DigitalCatalog" />
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
            </svg>
        </a>

        <f:form action="toggleWishlist" method="post" class="dc-form-inline dc-card__wishlist-form">
            <f:form.hidden name="articleUid" value="{article.uid}" />
            <button type="submit"
                    class="dc-card__wishlist-toggle js-wishlist-toggle"
                    data-article-uid="{article.uid}"
                    title="{f:translate(key: 'card.wishlist.add', extensionName: 'DigitalCatalog')}"
                    aria-label="{f:translate(key: 'card.wishlist.add', extensionName: 'DigitalCatalog')}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
                </svg>
            </button>
        </f:form>
    </div>
</article>

</html>
