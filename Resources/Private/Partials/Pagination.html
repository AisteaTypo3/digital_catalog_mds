<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:if condition="{pagination.lastPageNumber} > 1">
    <nav class="dc-pagination" aria-label="Seitennavigation">

        <f:if condition="{pagination.previousPageNumber}">
            <f:link.action action="list"
                arguments="{currentPage: pagination.previousPageNumber, search: search, bodyRegion: bodyRegionSlug, system: systemFilter, type: typeFilter, sterile: sterileFilter}"
                class="dc-pagination__btn dc-pagination__btn--prev"
                aria-label="Vorherige Seite">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M15.75 19.5 8.25 12l7.5-7.5" />
                </svg>
            </f:link.action>
        </f:if>

        <div class="dc-pagination__pages">
            <f:for each="{pagination.allPageNumbers}" as="page">
                <f:if condition="{page}">
                    <f:then>
                        <f:link.action action="list"
                            arguments="{currentPage: page, search: search, bodyRegion: bodyRegionSlug, system: systemFilter, type: typeFilter, sterile: sterileFilter}"
                            class="dc-pagination__page {f:if(condition: '{page} == {currentPage}', then: 'dc-pagination__page--active')}"
                            aria-current="{f:if(condition: '{page} == {currentPage}', then: 'page')}">
                            {page}
                        </f:link.action>
                    </f:then>
                    <f:else>
                        <span class="dc-pagination__ellipsis">…</span>
                    </f:else>
                </f:if>
            </f:for>
        </div>

        <f:if condition="{pagination.nextPageNumber}">
            <f:link.action action="list"
                arguments="{currentPage: pagination.nextPageNumber, search: search, bodyRegion: bodyRegionSlug, system: systemFilter, type: typeFilter, sterile: sterileFilter}"
                class="dc-pagination__btn dc-pagination__btn--next"
                aria-label="Nächste Seite">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="m8.25 4.5 7.5 7.5-7.5 7.5" />
                </svg>
            </f:link.action>
        </f:if>

    </nav>
</f:if>

</html>
